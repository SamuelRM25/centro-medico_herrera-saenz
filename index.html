    <!-- Swiper CSS only -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <style>
        /* =============================================
           BASE & PERFORMANCE
        ============================================= */
        *, *::before, *::after { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            overflow-x: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        img {
            /* Prevent layout shift */
            display: block;
        }

        /* Use GPU-composited properties only (transform, opacity) */
        .will-transform { will-change: transform; }

        /* =============================================
           HERO
        ============================================= */
        #hero-bg {
            position: absolute;
            inset: 0;
            background: #030816;
            overflow: hidden;
        }

        #hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.55;
            /* Parallax via transform (GPU) instead of background-attachment (CPU) */
            transform: scale(1.08);
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                        opacity 0.6s ease;
            will-change: transform;
        }

        #hero-bg:hover img {
            transform: scale(1.13);
            opacity: 0.7;
        }

        /* Animated gradient overlay on hero */
        .hero-overlay {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom,
                    rgba(7,89,133,0.55) 0%,
                    rgba(7,89,133,0.30) 40%,
                    rgba(3,8,22,0.92) 100%);
            pointer-events: none;
        }

        /* Pulse ring behind CTA */
        .pulse-ring {
            position: relative;
        }
        .pulse-ring::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 0.75rem;
            border: 2px solid rgba(250,204,21,0.6);
            animation: pulse-border 2s ease infinite;
            pointer-events: none;
        }
        @keyframes pulse-border {
            0%   { opacity: 1; transform: scale(1); }
            70%  { opacity: 0; transform: scale(1.06); }
            100% { opacity: 0; transform: scale(1.06); }
        }

        /* Animated badge shimmer */
        .badge-shimmer {
            position: relative;
            overflow: hidden;
        }
        .badge-shimmer::after {
            content: '';
            position: absolute;
            top: 0; left: -75%;
            width: 50%; height: 100%;
            background: linear-gradient(120deg,transparent,rgba(255,255,255,0.3),transparent);
            animation: shimmer 2.5s infinite;
        }
        @keyframes shimmer { to { left: 125%; } }

        /* =============================================
           SCROLL REVEAL — CSS-only via Intersection Observer classes
        ============================================= */
        .reveal {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity 0.65s ease, transform 0.65s ease;
        }
        .reveal.from-left  { transform: translateX(-40px); }
        .reveal.from-right { transform: translateX(40px); }
        .reveal.visible {
            opacity: 1;
            transform: translate(0);
        }
        .reveal.delay-1 { transition-delay: 0.1s; }
        .reveal.delay-2 { transition-delay: 0.2s; }
        .reveal.delay-3 { transition-delay: 0.35s; }

        /* =============================================
           STATS COUNTER
        ============================================= */
        .stat-number {
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        /* =============================================
           SERVICE CARDS
        ============================================= */
        .service-img-wrap {
            overflow: hidden;
            border-radius: 1rem;
            position: relative;
        }
        .service-img-wrap img {
            transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
            will-change: transform;
        }
        .service-img-wrap:hover img { transform: scale(1.07); }

        /* Glow line on hover */
        .service-img-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 1rem;
            box-shadow: inset 0 0 0 2px transparent;
            transition: box-shadow 0.4s ease;
            pointer-events: none;
        }
        .service-img-wrap:hover::after {
            box-shadow: inset 0 0 0 2px rgba(20,184,166,0.6),
                        0 0 30px rgba(20,184,166,0.2);
        }

        /* =============================================
           DOCTOR SWIPER
        ============================================= */
        .doctorSwiper .swiper-slide {
            transition: transform 0.55s cubic-bezier(0.4,0,0.2,1),
                        opacity 0.55s ease;
            transform: scale(0.88);
            opacity: 0.38;
        }
        .doctorSwiper .swiper-slide-active {
            transform: scale(1.12);
            opacity: 1;
            z-index: 10;
        }
        .doctorSwiper .swiper-slide-prev,
        .doctorSwiper .swiper-slide-next {
            opacity: 0.65;
            transform: scale(0.95);
        }

        /* =============================================
           LOGO NEON GLOW
        ============================================= */
        .logo-neon {
            filter: drop-shadow(0 0 10px rgba(20,184,166,0.85)) drop-shadow(0 0 22px rgba(20,184,166,0.45));
            opacity: 0.85;
            transition: filter 0.4s ease, transform 0.4s ease;
        }
        .logo-neon:hover {
            filter: drop-shadow(0 0 16px rgba(20,184,166,1)) drop-shadow(0 0 32px rgba(20,184,166,0.65));
            transform: scale(1.05);
        }

        /* =============================================
           TEXT GRADIENT
        ============================================= */
        .text-gradient {
            background: linear-gradient(135deg, #38bdf8 0%, #14b8a6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* =============================================
           NEON SECTION LABEL
        ============================================= */
        .section-label {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #facc15;
            padding: 0.25rem 0.85rem;
            border: 1px solid rgba(250,204,21,0.35);
            border-radius: 9999px;
            background: rgba(250,204,21,0.08);
            margin-bottom: 0.75rem;
        }
        .dark .section-label { color: #fde047; border-color: rgba(253,224,71,0.35); background: rgba(253,224,71,0.07); }

        /* =============================================
           STAT PILL LIVE BADGE
        ============================================= */
        .live-badge {

            align-items: center;
            gap: 0.4rem;
            font-size: 0.7rem;

            color: #10b981;
            background: rgba(16,185,129,0.12);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 9999px;
            padding: 0.2rem 0.6rem;
        }
        .live-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #10b981;
            animation: blink 1.2s ease infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* =============================================
           CONTACT SECTION
        ============================================= */
        #contact { background: #0c4a6e; }

        /* =============================================
           SCROLLBAR — subtle for dark mode
        ============================================= */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(14,165,233,0.4); border-radius: 3px; }

        /* =============================================
           MOBILE NAV HAMBURGER (hidden beyond md)
        ============================================= */
        #mobile-menu {

        #mobile-menu a {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

    <script>
    // ─── Init runs after DOM is ready ────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {

        // ── 1. Icons ─────────────────────────────────────────────────────────
        if (window.lucide) lucide.createIcons();

        // ── 2. Theme ─────────────────────────────────────────────────────────
        const html = document.documentElement;
        const themeBtn = document.getElementById('theme-toggle');

        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && prefersDark)) html.classList.add('dark');
        else html.classList.remove('dark');

        themeBtn?.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        });

        // ── 3. Mobile Menu ───────────────────────────────────────────────────
        const hamburger  = document.getElementById('hamburger');
        const mobileMenu = document.getElementById('mobile-menu');
        const closeMenu  = document.getElementById('close-menu');

        function openMenu()  { mobileMenu.classList.add('open');    document.body.style.overflow = 'hidden'; }
        function closeMenuFn(){ mobileMenu.classList.remove('open'); document.body.style.overflow = ''; }

        hamburger?.addEventListener('click', openMenu);
        closeMenu?.addEventListener('click', closeMenuFn);
        mobileMenu?.querySelectorAll('.mobile-link, a').forEach(a =>
            a.addEventListener('click', closeMenuFn)
        );

        // ── 4. Scroll Reveal — Intersection Observer (zero runtime cost) ─────
        const revealEls = document.querySelectorAll('.reveal');
        const revealObs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    revealObs.unobserve(e.target); // fire once
                }
            });
        }, { threshold: 0.15 });
        revealEls.forEach(el => revealObs.observe(el));

        // ── 5. Counter Animation — lightweight, no GSAP ──────────────────────
        const counters = document.querySelectorAll('.stat-number[data-target]');
        const countObs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if (!e.isIntersecting) return;
                const el     = e.target;
                const target = +el.dataset.target;
                const suffix = el.dataset.suffix || '';
                const dur    = 1400;
                const step   = 16;
                const inc    = target / (dur / step);
                let cur = 0;
                const tick = () => {
                    cur = Math.min(cur + inc, target);
                    el.textContent = Math.round(cur) + suffix;
                    if (cur < target) requestAnimationFrame(tick);
                };
                requestAnimationFrame(tick);
                countObs.unobserve(el);
            });
        }, { threshold: 0.5 });
        counters.forEach(c => countObs.observe(c));

        // ── 6. Swiper ────────────────────────────────────────────────────────
        if (window.Swiper) {
            new Swiper('.doctorSwiper', {
                slidesPerView: 1.15,
                spaceBetween: 24,
                loop: true,
                centeredSlides: true,
                grabCursor: true,
                speed: 600,
                autoplay: { delay: 4000, disableOnInteraction: false, pauseOnMouseEnter: true },
                pagination: { el: '.swiper-pagination', clickable: true, dynamicBullets: true },
                navigation: { nextEl: '.swiper-btn-next', prevEl: '.swiper-btn-prev' },
                breakpoints: {
                    640:  { slidesPerView: 1.7, spaceBetween: 32 },
                    1024: { slidesPerView: 2.8, spaceBetween: 48 },
                },
            });
        }

        // ── 7. Suppress Tailwind CDN warning ─────────────────────────────────
        const ow = console.warn;
        console.warn = (...a) => {
            if (typeof a[0] === 'string' && a[0].includes('cdn.tailwindcss.com')) return;
            ow(...a);
        };
    });
    </script>
